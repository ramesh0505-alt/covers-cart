name = "covers-cart-online-backend"
main = "worker.js"
compatibility_date = "2024-06-15"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm install && npm run build"
cwd = "."
watch_dir = "."

[env.production]
name = "covers-cart-online-backend-prod"

[observability]
enabled = true
head_sampling_rate = 1
