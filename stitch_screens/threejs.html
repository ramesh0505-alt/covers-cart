<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_91 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_91" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_91');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const container = document.querySelector('.mystery-animation-container');
if (container) {
    const width = container.clientWidth || window.innerWidth;
    const height = container.clientHeight || 400;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // Mystery Box / Pouch silhouette
    const group = new THREE.Group();
    
    const geometry = new THREE.BoxGeometry(2, 2.5, 0.5);
    const material = new THREE.MeshPhongMaterial({ 
        color: 0x108474, 
        transparent: true, 
        opacity: 0.8,
        shininess: 100 
    });
    const box = new THREE.Mesh(geometry, material);
    group.add(box);

    // Subtle question mark shape using primitives
    const qTopGeom = new THREE.TorusGeometry(0.5, 0.1, 16, 100, Math.PI);
    const qTop = new THREE.Mesh(qTopGeom, new THREE.MeshBasicMaterial({ color: 0xffffff }));
    qTop.position.y = 0.5;
    qTop.rotation.z = Math.PI / 2;
    group.add(qTop);

    const qDotGeom = new THREE.SphereGeometry(0.1, 16, 16);
    const qDot = new THREE.Mesh(qDotGeom, new THREE.MeshBasicMaterial({ color: 0xffffff }));
    qDot.position.y = -0.5;
    group.add(qDot);

    scene.add(group);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        group.rotation.y += 0.01;
        group.position.y = Math.sin(Date.now() * 0.002) * 0.1;
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        const w = container.clientWidth || window.innerWidth;
        const h = container.clientHeight || 400;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });

    animate();
}

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_91 -->
</body>
</html>
