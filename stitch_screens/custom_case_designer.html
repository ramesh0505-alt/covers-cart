<script>
        function updateText(val) {
            const previewText = document.getElementById('preview-text');
            const span = previewText.querySelector('span');
            if (val.trim() !== '') {
                span.innerText = val.toUpperCase();
                previewText.style.opacity = '1';
            } else {
                previewText.style.opacity = '0';
            }
        }

        const patterns = {
            'Anime': 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=800',
            'Cyber': 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=800',
            'Liquid': 'https://images.unsplash.com/photo-1604076913837-52ab5629fba9?auto=format&fit=crop&q=80&w=800',
            'Duo': 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&q=80&w=800'
        };

        function changePattern(key) {
            const preview = document.getElementById('dynamic-pattern');
            preview.style.opacity = '0';
            setTimeout(() => {
                preview.style.backgroundImage = `url('${patterns[key]}')`;
                preview.style.opacity = '1';
            }, 300);
            
            // UI Feedback: Highlight Selected
            const buttons = document.querySelectorAll('button.flex-shrink-0');
            buttons.forEach(btn => {
                const imgContainer = btn.querySelector('div');
                const label = btn.querySelector('p');
                imgContainer.classList.remove('border-primary', 'ring-2', 'ring-primary', 'ring-offset-2');
                imgContainer.classList.add('border-transparent');
                label.classList.remove('text-primary');
                label.classList.add('text-on-surface-variant');
            });

            // Re-apply to active
            event.currentTarget.querySelector('div').classList.remove('border-transparent');
            event.currentTarget.querySelector('div').classList.add('border-primary', 'ring-2', 'ring-primary', 'ring-offset-2');
            event.currentTarget.querySelector('p').classList.remove('text-on-surface-variant');
            event.currentTarget.querySelector('p').classList.add('text-primary');
        }

        // Simple parallax effect on scroll for preview
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const preview = document.getElementById('case-preview');
            const rate = scrolled * 0.05;
            if (scrolled < 400) {
                preview.style.transform = `translate3d(0px, ${rate}px, 0px) rotate(${rate * 0.1}deg)`;
            }
        });
    </script>
