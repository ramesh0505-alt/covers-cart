<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->

</button>
<div class="flex items-center justify-center">
<img alt="CoverStall Logo" class="h-8 md:h-10 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLuHMMQSbIYMZEbbpqkSZGBBZTPPShGYn_el8XS0_Gt5aCkkIaZbC4r0BmjadizBGtOUIWC60oQ1IAL97fOoZVMcv_-Tcx6GEpjK5-3aVjGW2Duu0gKXHl9GGUI2UPwneuNcgpQCIrl_87-0lCIMls72Pe1Iaw3WzPB4I-7UAVAHgspJXeLn6mA0GXZu0cbKQmpUQmQDcmOxFWHQnV-boGApM4tlkXRKmny5BIfFTpayJcMYeORb8Qb3dCM"/>
</div>

</nav>
<!-- Main Content Canvas -->
<main class="w-full max-w-[600px] flex-grow flex flex-col px-container-margin py-stack-lg gap-stack-lg">
<!-- Welcome Section -->
<header class="flex flex-col gap-unit">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile md:text-headline-lg md:font-headline-lg text-on-background">Create Account</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Join the community and start customizing</p>
</header>
<!-- Profile Photo Upload -->
<div class="flex flex-col items-center gap-stack-sm">
<div class="relative w-24 h-24 rounded-full bg-surface-container-high border-2 border-dashed border-outline-variant flex items-center justify-center cursor-pointer hover:bg-surface-container-highest transition-colors group">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-primary transition-colors">add_a_photo</span>
<div class="absolute bottom-0 right-0 bg-primary p-1 rounded-full text-white border-2 border-surface-white">
<span class="material-symbols-outlined text-sm leading-none">add</span>
</div>
</div>
<span class="text-label-caps font-label-caps text-on-surface-variant">Upload Photo</span>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault()">
<!-- Full Name -->
<div class="flex flex-col gap-unit">
<label class="text-body-sm font-body-sm text-on-surface-variant px-1" for="full_name">Full Name</label>
<input class="w-full h-12 px-4 bg-surface-white border border-outline-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="full_name" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-unit">
<label class="text-body-sm font-body-sm text-on-surface-variant px-1" for="email">Email Address</label>
<input class="w-full h-12 px-4 bg-surface-white border border-outline-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="email" placeholder="hello@example.com" type="email"/>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-unit">
<label class="text-body-sm font-body-sm text-on-surface-variant px-1" for="phone">Phone Number</label>
<div class="flex gap-2">
<div class="flex items-center justify-center px-3 bg-surface-container border border-outline-variant rounded-lg text-body-sm">
                        +91
                    </div>
<input class="flex-1 h-12 px-4 bg-surface-white border border-outline-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="phone" placeholder="98765 43210" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-unit">
<label class="text-body-sm font-body-sm text-on-surface-variant px-1" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-white border border-outline-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="flex gap-1 mt-2 px-1">
<div class="h-1 flex-1 rounded-full bg-primary-container"></div>
<div class="h-1 flex-1 rounded-full bg-primary-container"></div>
<div class="h-1 flex-1 rounded-full bg-outline-variant"></div>
<div class="h-1 flex-1 rounded-full bg-outline-variant"></div>
</div>
<span class="text-[10px] font-bold text-primary px-1 uppercase tracking-wider">Medium Strength</span>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-unit">
<label class="text-body-sm font-body-sm text-on-surface-variant px-1" for="confirm_password">Confirm Password</label>
<input class="w-full h-12 px-4 bg-surface-white border border-outline-variant rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-stack-sm mt-stack-sm">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-body-sm font-body-sm text-on-surface-variant" for="terms">
                    I agree to the <a class="text-primary font-bold hover:underline" href="#">Terms &amp; Conditions</a> and have read the <a class="text-primary font-bold hover:underline" href="#">Privacy Policy</a>.
                </label>
</div>
<!-- Primary CTA -->
<button class="mt-stack-md w-full h-14 bg-pure-black text-surface-white font-bold rounded-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
<span>Create Account</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
</form>
<!-- Social Login Divider -->
<div class="flex items-center gap-stack-md py-stack-md">
<div class="h-px flex-1 bg-outline-variant"></div>
<span class="text-label-caps font-label-caps text-outline">OR SIGN UP WITH</span>
<div class="h-px flex-1 bg-outline-variant"></div>
</div>
<div class="flex gap-stack-md">
<button class="flex-1 h-12 border border-outline-variant rounded-lg flex items-center justify-center hover:bg-surface-container-low transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">

<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<button class="flex-1 h-12 border border-outline-variant rounded-lg flex items-center justify-center hover:bg-surface-container-low transition-colors">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"></path>

<footer class="flex justify-center items-center py-stack-md mt-auto">
<p class="text-body-sm font-body-sm text-on-surface-variant">
                Already have an account? <a class="text-primary font-bold hover:underline" href="#">Login</a>
</p>
</footer>
</main>
<!-- Bottom Spacing for safe area -->
<div class="h-8 w-full"></div>
<script>
        // Password visibility toggle logic
        const toggleBtn = document.querySelector('form button[type="button"]');
        const passwordInput = document.getElementById('password');
        
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.children[0].textContent = isPassword ? 'visibility_off' : 'visibility';
        });

        // Simple validation visualization
        const inputs = document.querySelectorAll('input:not([type="checkbox"])');
        inputs.forEach(input => {
            input.addEventListener('blur', () => {
                if (input.value.length > 0) {
                    input.classList.add('border-primary');
                    input.classList.remove('border-outline-variant');
                } else {
                    input.classList.remove('border-primary');
                    input.classList.add('border-outline-variant');
                }
            });
        });
    </script>
</body></html>
